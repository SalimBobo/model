<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matematik Modellashtirish Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e3050;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --correct: #10b981;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --gold: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(124,58,237,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* SCREENS */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }

  /* HOME */
  #home {
    text-align: center;
    gap: 2rem;
  }
  .logo-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    padding: 0.4rem 1rem;
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 2px;
    display: inline-block;
    animation: pulse-border 3s infinite;
  }
  @keyframes pulse-border {
    0%, 100% { border-color: rgba(0,212,255,0.3); }
    50% { border-color: rgba(0,212,255,0.8); box-shadow: 0 0 20px rgba(0,212,255,0.2); }
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900;
    line-height: 1.1;
    background: linear-gradient(135deg, #e2e8f0 0%, var(--accent) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    color: var(--text-muted);
    font-size: 1.1rem;
    max-width: 480px;
    line-height: 1.6;
  }
  .stats-row {
    display: flex;
    gap: 2rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 2rem;
    text-align: center;
  }
  .stat-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 2rem;
    font-weight: 600;
    color: var(--accent);
    display: block;
  }
  .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 0.3rem; }
  
  .btn-group { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 1px;
    padding: 0.9rem 2rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
    text-transform: uppercase;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,212,255,0.3); }
  .btn-secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid rgba(0,212,255,0.4);
  }
  .btn-secondary:hover { background: rgba(0,212,255,0.08); border-color: var(--accent); }
  .btn-danger {
    background: rgba(239,68,68,0.1);
    color: #ef4444;
    border: 1px solid rgba(239,68,68,0.3);
  }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }

  /* PROGRESS BAR */
  .progress-wrap {
    width: 100%;
    max-width: 700px;
    margin-bottom: 1.5rem;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.6rem;
  }
  .q-counter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .score-live {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent);
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* QUIZ CARD */
  #quiz { gap: 0; align-items: center; justify-content: flex-start; padding-top: 2rem; padding-bottom: 2rem; }
  .quiz-card {
    width: 100%;
    max-width: 700px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    position: relative;
    overflow: hidden;
  }
  .quiz-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .q-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .q-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 2rem;
  }
  .options-grid {
    display: grid;
    gap: 0.75rem;
  }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.95rem;
    transition: all 0.2s;
    width: 100%;
  }
  .option-btn:hover:not(:disabled) {
    border-color: rgba(0,212,255,0.5);
    background: rgba(0,212,255,0.06);
    transform: translateX(4px);
  }
  .option-letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    font-weight: 600;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .option-btn:hover:not(:disabled) .option-letter {
    background: rgba(0,212,255,0.2);
    color: var(--accent);
  }
  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(16,185,129,0.12);
    animation: pop 0.3s ease;
  }
  .option-btn.correct .option-letter {
    background: var(--correct);
    color: white;
  }
  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(239,68,68,0.1);
  }
  .option-btn.wrong .option-letter {
    background: var(--wrong);
    color: white;
  }
  .option-btn:disabled { cursor: default; }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  /* FEEDBACK */
  .feedback-bar {
    margin-top: 1.5rem;
    padding: 1rem 1.25rem;
    border-radius: 10px;
    font-size: 0.9rem;
    display: none;
    align-items: center;
    gap: 0.75rem;
    animation: slide-up 0.3s ease;
  }
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .feedback-bar.correct { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: #34d399; display: flex; }
  .feedback-bar.wrong { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; display: flex; }
  .feedback-icon { font-size: 1.3rem; }

  .quiz-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1.5rem;
    gap: 1rem;
  }
  .btn-next {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    padding: 0.75rem 1.75rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: none;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
    transition: all 0.2s;
    margin-left: auto;
  }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,212,255,0.3); }
  .btn-next.visible { display: block; animation: slide-up 0.3s ease; }

  /* RESULTS */
  #results { gap: 1.5rem; text-align: center; }
  .result-score-ring {
    width: 160px;
    height: 160px;
    position: relative;
  }
  .ring-svg { transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--border); stroke-width: 8; }
  .ring-fill { fill: none; stroke: url(#ringGrad); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); }
  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .ring-pct {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
  }
  .ring-sub { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--text-muted); letter-spacing: 2px; }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
  }
  .result-stats {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .rstat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.5rem;
    text-align: center;
    min-width: 100px;
  }
  .rstat-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.75rem;
    font-weight: 600;
  }
  .rstat-val.green { color: var(--correct); }
  .rstat-val.red { color: var(--wrong); }
  .rstat-val.blue { color: var(--accent); }
  .rstat-key { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 0.3rem; }

  /* UNANSWERED MODE NOTICE */
  .mode-badge {
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.3);
    color: var(--gold);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    letter-spacing: 1px;
    display: inline-block;
  }

  /* GRID progress on home */
  .dots-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    max-width: 400px;
    justify-content: center;
  }
  .dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    background: var(--border);
    transition: background 0.3s;
  }
  .dot.answered { background: var(--correct); }
  .dot.wrong-answered { background: var(--wrong); }

  @media (max-width: 600px) {
    .quiz-card { padding: 1.5rem; }
    .btn-group { flex-direction: column; align-items: stretch; }
    .stats-row { gap: 1rem; }
  }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <div class="logo-badge">Quiz Tizimi</div>
  <h1>Matematik<br>Modellashtirish</h1>
  <p class="subtitle">218 ta savol, har safar 25 tasini tasodifiy tanlash. Javob tartibi aralashtirilib beriladi.</p>
  
  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-number" id="hs-total">218</span>
      <div class="stat-label">Jami savollar</div>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="hs-answered">0</span>
      <div class="stat-label">Javob berilgan</div>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="hs-remaining">218</span>
      <div class="stat-label">Qolganlar</div>
    </div>
  </div>

  <div class="dots-grid" id="dots-grid"></div>

  <div class="btn-group">
    <button class="btn btn-primary" onclick="startQuiz('all')">▶ Yangi Test (25 ta)</button>
    <button class="btn btn-secondary" id="btn-unanswered" onclick="startQuiz('unanswered')">⚡ Javob Berilmaganlar</button>
    <button class="btn btn-danger" onclick="resetProgress()">↺ Progressni Tozalash</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz" class="screen">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span class="q-counter" id="q-counter">Savol 1 / 25</span>
      <span class="score-live" id="score-live">✓ 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="quiz-card">
    <div class="q-number" id="q-number">SAVOL 001</div>
    <div class="q-text" id="q-text">Loading...</div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback-bar" id="feedback-bar">
      <span class="feedback-icon" id="feedback-icon"></span>
      <span id="feedback-text"></span>
    </div>
    <div class="quiz-footer">
      <button class="btn btn-secondary" onclick="goHome()" style="font-size:0.8rem;padding:0.6rem 1rem;">⬅ Orqaga</button>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Keyingi →</button>
    </div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="results" class="screen">
  <div id="mode-badge-result"></div>
  <div class="result-score-ring">
    <svg class="ring-svg" width="160" height="160" viewBox="0 0 160 160">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#00d4ff"/>
          <stop offset="100%" style="stop-color:#7c3aed"/>
        </linearGradient>
      </defs>
      <circle class="ring-track" cx="80" cy="80" r="68"/>
      <circle class="ring-fill" id="ring-fill" cx="80" cy="80" r="68" stroke-dasharray="427.26" stroke-dashoffset="427.26"/>
    </svg>
    <div class="ring-label">
      <span class="ring-pct" id="ring-pct">0%</span>
      <span class="ring-sub">BALL</span>
    </div>
  </div>

  <h2 class="result-title" id="result-title">Natija</h2>

  <div class="result-stats">
    <div class="rstat"><div class="rstat-val green" id="r-correct">0</div><div class="rstat-key">To'g'ri</div></div>
    <div class="rstat"><div class="rstat-val red" id="r-wrong">0</div><div class="rstat-key">Noto'g'ri</div></div>
    <div class="rstat"><div class="rstat-val blue" id="r-total">25</div><div class="rstat-key">Jami</div></div>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" onclick="startQuiz('all')">▶ Yana O'ynash</button>
    <button class="btn btn-secondary" id="btn-retry-unanswered" onclick="startQuiz('unanswered')">⚡ Qolganlarni O'rganish</button>
    <button class="btn btn-secondary" onclick="goHome()">⬅ Bosh Sahifa</button>
  </div>
</div>

<script>

// STATE
let progress = JSON.parse(localStorage.getItem('mm_progress') || '{}');
// progress[idx] = 'correct' | 'wrong'

let sessionQuestions = [];
let currentIdx = 0;
let sessionScore = 0;
let quizMode = 'all';

const LETTERS = ['A', 'B', 'C', 'D'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getUnanswered() {
  return ALL_QUESTIONS.map((q, i) => ({...q, originalIdx: i}))
    .filter(q => !progress[q.originalIdx]);
}

function updateHomeStats() {
  const answered = Object.keys(progress).length;
  document.getElementById('hs-answered').textContent = answered;
  document.getElementById('hs-remaining').textContent = 218 - answered;

  // Update btn
  const unans = getUnanswered().length;
  const btn = document.getElementById('btn-unanswered');
  btn.textContent = `⚡ Javob Berilmaganlar (${unans})`;
  if (unans === 0) btn.disabled = true;

  // Draw dots
  const grid = document.getElementById('dots-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 218; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (progress[i] === 'correct' ? ' answered' : (progress[i] === 'wrong' ? ' wrong-answered' : ''));
    grid.appendChild(d);
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  updateHomeStats();
  showScreen('home');
}

function resetProgress() {
  if (confirm("Barcha progressni tozalashni xohlaysizmi?")) {
    localStorage.removeItem('mm_progress');
    progress = {};
    updateHomeStats();
  }
}

function startQuiz(mode) {
  quizMode = mode;
  let pool;
  if (mode === 'unanswered') {
    pool = getUnanswered();
    if (pool.length === 0) { alert("Barcha savollarga javob berildi!"); return; }
  } else {
    pool = ALL_QUESTIONS.map((q, i) => ({...q, originalIdx: i}));
  }

  const picked = shuffle(pool).slice(0, 25);
  // For each question, shuffle options but keep track of correct answer
  sessionQuestions = picked.map(q => {
    const correctText = q.options[q.correct];
    const shuffled = shuffle(q.options);
    return {
      question: q.question,
      options: shuffled,
      correctText,
      correctIdx: shuffled.indexOf(correctText),
      originalIdx: q.originalIdx
    };
  });

  currentIdx = 0;
  sessionScore = 0;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = sessionQuestions[currentIdx];
  document.getElementById('q-number').textContent = `SAVOL ${String(currentIdx + 1).padStart(3, '0')}`;
  document.getElementById('q-text').textContent = q.question;
  document.getElementById('q-counter').textContent = `Savol ${currentIdx + 1} / ${sessionQuestions.length}`;
  document.getElementById('score-live').textContent = `✓ ${sessionScore}`;

  const pct = (currentIdx / sessionQuestions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${LETTERS[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  document.getElementById('feedback-bar').className = 'feedback-bar';
  document.getElementById('btn-next').className = 'btn-next';
}

function selectAnswer(chosenIdx) {
  const q = sessionQuestions[currentIdx];
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  const isCorrect = chosenIdx === q.correctIdx;
  buttons[chosenIdx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) buttons[q.correctIdx].classList.add('correct');

  // Save progress
  if (isCorrect) {
    sessionScore++;
    progress[q.originalIdx] = 'correct';
  } else {
    progress[q.originalIdx] = 'wrong';
  }
  localStorage.setItem('mm_progress', JSON.stringify(progress));

  // Feedback
  const fb = document.getElementById('feedback-bar');
  const fbIcon = document.getElementById('feedback-icon');
  const fbText = document.getElementById('feedback-text');
  if (isCorrect) {
    fb.className = 'feedback-bar correct';
    fbIcon.textContent = '✓';
    fbText.textContent = "To'g'ri javob!";
  } else {
    fb.className = 'feedback-bar wrong';
    fbIcon.textContent = '✗';
    fbText.textContent = `Noto'g'ri. To'g'ri javob: "${q.options[q.correctIdx]}"`;
  }

  document.getElementById('btn-next').className = 'btn-next visible';
  document.getElementById('score-live').textContent = `✓ ${sessionScore}`;
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= sessionQuestions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  const total = sessionQuestions.length;
  const pct = Math.round((sessionScore / total) * 100);

  document.getElementById('r-correct').textContent = sessionScore;
  document.getElementById('r-wrong').textContent = total - sessionScore;
  document.getElementById('r-total').textContent = total;
  document.getElementById('ring-pct').textContent = pct + '%';

  let title = '';
  if (pct >= 90) title = '🏆 Ajoyib natija!';
  else if (pct >= 70) title = '👍 Yaxshi ish!';
  else if (pct >= 50) title = '📚 Davom eting!';
  else title = '💪 Ko\'proq mashq kerak';
  document.getElementById('result-title').textContent = title;

  const badge = document.getElementById('mode-badge-result');
  if (quizMode === 'unanswered') {
    badge.innerHTML = '<span class="mode-badge">⚡ Javob berilmagan rejim</span>';
  } else {
    badge.innerHTML = '';
  }

  const unans = getUnanswered().length;
  document.getElementById('btn-retry-unanswered').textContent = `⚡ Qolganlarni O'rganish (${unans})`;
  if (unans === 0) document.getElementById('btn-retry-unanswered').disabled = true;

  showScreen('results');

  // Animate ring
  const circumference = 427.26;
  const offset = circumference - (pct / 100) * circumference;
  setTimeout(() => {
    document.getElementById('ring-fill').style.strokeDashoffset = offset;
  }, 100);
}

// Init
progress = JSON.parse(localStorage.getItem('mm_progress') || '{}');
updateHomeStats();
</script>
